  <text x="30" y="30" font-family="serif" font-size="8" fill="#dc2626" text-anchor="middle" font-weight="bold">イワサキ</text>
  <text x="30" y="40" font-family="serif" font-size="8" fill="#dc2626" text-anchor="middle" font-weight="bold">内装</text>
  
